<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Döviz Hesaplayıcı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="kart">
    <h2>Canlı Döviz Çevirici Panel</h2>
    
    <!-- Çevrilecek Miktar -->
    <input id="dolarMiktari" type="number" placeholder="Miktarı girin...">
    
    <!-- Para Birimi Seçimi (YENİ SEÇENEKLER EKLENDİ) -->
    <select id="paraBirimi">
        <option value="USD_TO_TRY">Dolar (USD) -> TL</option>
        <option value="EUR_TO_TRY">Euro (EUR) -> TL</option>
        <option value="GBP_TO_TRY">Sterlin (GBP) -> TL</option>
        <hr> <!-- Görsel ayrım için -->
        <option value="TRY_TO_USD">TL -> Dolar (USD)</option>
        <option value="TRY_TO_EUR">TL -> Euro (EUR)</option>
        <option value="TRY_TO_GBP">TL -> Sterlin (GBP)</option>
    </select>
    
    <button id="btnHesapla">Hesapla</button>
    
    <!-- Sonucu göstereceğimiz alan -->
    <div id="sonucAlani">
</div>

    <script src="odev.js"></script>  
</body> 
</html>
